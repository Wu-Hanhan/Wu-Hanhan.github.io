# Welcome to Jekyll!
#
# This config file is meant for settings that affect your entire site, values
# which you are expected to set up once and rarely need to edit after that.
# For technical reasons, this file is *NOT* reloaded automatically when you use
# `jekyll serve -l -H localhost`. If you change this file, please restart the 
# server process.

# Basic Site Settings
locale                   : "en-US"
site_theme               : "default" # The available themes options are "default", "air", "sunrise", "mint", "dirt" and "contrast"
title                    : "Hanhan Wu"
title_separator          : "-"
name                     : &name "Hanhan Wu"
description              : &description "Hanhan Wu's academic portfolio"   # Update this with a general description of your site, this is the default if not overridden by a page
url                      : https://wu-hanhan.github.io # The base hostname & protocol for your site e.g. "https://[your GitHub username].github.io",
                                                           # or if you already have some other page hosted on Github then use "https://[your GitHub username].github.io/[Your Repo Name]"
baseurl                  : "" # the subpath of your site, e.g. "/blog"
repository               : "Wu-Hanhan/Wu-Hanhan.github.io"

# Site Author - The following control what appear as part of the author content on the side bar.
#               If a field is blank the icon and link will not appear, otherwise it will be shown.
#               Additional customization can be done by editing /_includes/author-profile.html
author:
  # Biographic information
  avatar           : "IMG_6956.JPG"
  name             : "Hanhan Wu"
  pronouns         : # example: "she/her"  
  bio              : "PhD student at George Mason University. Research interests: machine learning for sensing, hardware-aware AI, and distributed scientific ML."
  location         : "Fairfax, VA"
  employer         : "George Mason University, ECE"
  uri              : # URL
  email            : "hwu28@gmu.edu"

  # Academic websites
  academia         : # URL
